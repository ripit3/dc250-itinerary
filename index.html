const FLEX_COLOR = "#C084FC";
const mapsUrl = q => "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(q);

let activeDay = 0;
const openTips = {};

function dirChip(q){ return '<a class="chip chip-dir" target="_blank" rel="noopener noreferrer" href="'+mapsUrl(q)+'">📍 Directions</a>'; }

function eventCard(ev, idx){
  const isFlexNote = ev.type === "flexnote";
  const key = activeDay + "-" + idx;
  const open = !!openTips[key];
  const dotColor = isFlexNote ? FLEX_COLOR : (ev.upgraded ? "#FFD700" : DAYS[activeDay].color);
  const dotBorder = isFlexNote ? FLEX_COLOR : (ev.upgraded ? "#FFD700" : "rgba(255,255,255,.3)");
  const dotShadow = ev.upgraded ? "0 0 8px rgba(255,215,0,.5)" : (isFlexNote ? "0 0 8px rgba(192,132,252,.5)" : "none");
  const last = idx === DAYS[activeDay].events.length - 1;
  let cls = "card"; if(isFlexNote) cls += " flex"; else if(ev.upgraded) cls += " up"; else if(ev.booked) cls += " bk";

  let chips = "";
  if(ev.booked || ev.tip || ev.mapQuery){
    chips += '<div class="chips sys">';
    if(ev.booked) chips += '<span class="chip chip-bk">✓ Booked</span>';
    if(ev.mapQuery) chips += dirChip(ev.mapQuery);
    if(ev.tip) chips += '<button class="chip chip-tip" data-tip="'+key+'">'+(open?"Hide Tip ▲":"Pro Tip ▼")+'</button>';
    chips += '</div>';
  }
  let tipHtml = (ev.tip && open) ? '<div class="tipbody sys">💡 '+ev.tip+'</div>' : '';

  return '<div class="row">'
    + '<div class="tcol"><div class="ttime">'+ev.time+'</div>'
    + '<div class="dot" style="background:'+dotColor+';border:2px solid '+dotBorder+';box-shadow:'+dotShadow+'"></div>'
    + (last ? '' : '<div class="line"></div>') + '</div>'
    + '<div class="'+cls+'">'
    + (ev.upgraded ? '<div class="badge sys">★ Upgraded</div>' : '')
    + '<div class="ctitle" style="'+(ev.upgraded?'padding-right:80px':'')+'">'+ev.icon+' '+ev.title+'</div>'
    + '<div class="csub">'+ev.subtitle+'</div>'
    + chips + tipHtml
    + '</div></div>';
}

function flexCard(item, i){
  const key = "flex-" + i;
  const open = !!openTips[key];
  const up = item.title.indexOf("★") >= 0;
  let body = "";
  if(open){
    body = '<div class="statusbody sys">🎟️ <strong>Status:</strong> '+item.status+'</div>'
         + '<div class="slotbody sys">🕒 <strong>When to slot it in:</strong> '+item.slot+'</div>';
  }
  return '<div class="flexcard'+(up?' up':'')+'">'
    + '<div class="ctitle">'+item.icon+' '+item.title+'</div>'
    + '<div class="from sys">'+item.from+'</div>'
    + '<div class="csub" style="margin-bottom:8px">'+item.subtitle+'</div>'
    + '<div class="chips sys">'+dirChip(item.mapQuery)
    + '<button class="chip chip-flex" data-tip="'+key+'">'+(open?"Hide Details ▲":"When to slot it in ▼")+'</button></div>'
    + body + '</div>';
}

function render(){
  const d = DAYS[activeDay];
  let html = '';
  html += '<div class="header"><div class="flag">🇺🇸</div>'
    + '<h1>Washington, D.C.</h1>'
    + '<div class="sub1">America\'s 250th Birthday</div>'
    + '<div class="sub2">July 1 – 6, 2026 · Family of 4</div>'
    + '<div class="rule"></div></div>';

  html += '<div class="tabs">';
  DAYS.forEach((day, i) => {
    const act = i === activeDay;
    const style = act
      ? 'border:2px solid '+day.color+';background:linear-gradient(135deg,'+day.color+'22,'+day.color+'44);color:#fff;'
      : '';
    html += '<button class="tab" style="'+style+'" data-tab="'+i+'">'
      + '<div class="em">'+day.emoji+'</div>'
      + '<div class="d1">'+day.date.split(",")[0].toUpperCase()+'</div>'
      + '<div class="d2">'+day.date.split(", ")[1]+'</div></button>';
  });
  html += '</div>';

  html += '<div class="dayhead"><h2>'+d.label+'</h2><div class="dd">'+d.date+', 2026</div></div>';
  html += '<div class="timeline">' + d.events.map(eventCard).join('') + '</div>';

  // Tips
  html += '<div class="panel"><div class="panel-inner"><h3>🎒 Essential Trip Tips</h3><div class="tipgrid">';
  TIPS.forEach(t => {
    html += '<div class="tipcell sys"><div class="ti">'+t.icon+'</div><div class="tt">'+t.title+'</div><div class="tx">'+t.text+'</div></div>';
  });
  html += '</div></div></div>';

  // Checklist
  html += '<div class="panel"><div class="checkwrap"><h3>📋 Book Ahead Checklist</h3><div class="checklist sys">';
  CHECKLIST.forEach(item => {
    const mark = item.booked ? '<span style="color:#4ADE80;flex-shrink:0">✓</span>' : '<span style="color:#FFD700;flex-shrink:0">☐</span>';
    const col = item.booked ? '#86EFAC' : '#B0C4D8';
    html += '<div class="checkitem">'+mark+'<span style="color:'+col+'">'+item.text+'</span></div>';
  });
  html += '</div></div></div>';

  // Flexible options
  html += '<div class="panel"><div class="flexwrap"><h3>🃏 Flexible Options</h3>'
    + '<div class="eyebrow sys">Wild cards — slot in on a whim</div>'
    + '<div class="flexintro sys">None of these are booked, and none are on July 3 or 4 (those days stay locked). They\'re your bench: pull one in if a plan falls through, if the girls want more museums, or drop them entirely if everyone\'s museum\'d out. Your two open windows are <strong class="hl">Sun July 5, 9 AM–12 PM</strong> and <strong class="hl">Mon July 6, 10 AM–3:30 PM</strong>.</div>';
  html += FLEXIBLE.map(flexCard).join('');
  html += '<div class="walkin sys"><b>🏛️ If they want EVEN more museums</b><br>The big Smithsonians on the Mall — Natural History, American History, and their neighbors — are free and need no reservation. They\'re the natural overflow valve for a "we love museums" day, and they\'re walk-in, so they don\'t belong on this planned list. Not on your itinerary; just know they\'re there.</div>';
  html += '</div></div>';

  html += '<div class="foot">Add to Home Screen for a full-screen app · DC 250</div>';

  document.getElementById('app').innerHTML = html;
  window.scrollTo(0, 0);
}

document.getElementById('app').addEventListener('click', function(e){
  const tab = e.target.closest('[data-tab]');
  if(tab){ activeDay = parseInt(tab.getAttribute('data-tab'), 10); render(); return; }
  const tip = e.target.closest('[data-tip]');
  if(tip){ const k = tip.getAttribute('data-tip'); openTips[k] = !openTips[k]; render(); }
});

render();
</script>
